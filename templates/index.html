<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Flask Blog</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<h1>Welcome to my B(l)ook!</h1>

<p>
    <a href="{{ url_for('add') }}">➕ Add a new blog post</a>
</p>

{% for post in posts %}
<div class="post">
    <h2>{{ post.title }}</h2>
    <p><em>Written by {{ post.author }}</em></p>
    <p>{{ post.content }}</p>
    <p>
        <a href="{{ url_for('update', post_id=post.id) }}" style="color:blue;">✏️ Update</a>
        <a href="{{ url_for('delete', post_id=post.id) }}" style="color:red;" onclick="return confirm('Are you sure you want to delete this post?');">🗑️ Delete</a>
    </p>
</div>
{% endfor %}

</body>
</html>
